name: web build & deploy

# main 푸시 시 빌드+배포, feature/web 푸시 시 빌드만(검증), 수동 실행 가능
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WASM (Emscripten)
        run: |
          emcc game/main.c game/util.c game/save.c game/player.c game/battle.c game/item.c \
            -O2 -sASYNCIFY -sALLOW_MEMORY_GROWTH=1 \
            -o web/game.js
          ls -la web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
